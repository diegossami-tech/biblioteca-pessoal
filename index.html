<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Pessoal</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%233d5a47'/><path d='M6 5v14M10 5v14M14 6l3 13M20 18l-2 1' stroke='%23f3ede0' stroke-width='1.6' stroke-linecap='round' fill='none'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #eee9df;
    --cream-2: #e3ddd1;
    --paper: #fbf8f1;
    --sidebar: #e8e2d6;
    --ink: #1c1814;
    --ink-soft: #3d342b;
    --rule: rgba(28, 24, 20, 0.12);
    --rule-soft: rgba(28, 24, 20, 0.06);
    --primary: #3d5a47;
    --primary-soft: #5a7a64;
    --burgundy: #6b1f2a;
    --ochre: #b8843d;
    --moss: #5a7a4f;
    --slate: #3d5a6c;
    --terracotta: #7a5230;
    --font-serif: 'Fraunces', 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    --font-sans: 'Instrument Sans', 'Helvetica Neue', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  button { font-family: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
  input, textarea, select { font-family: inherit; color: inherit; background: transparent; border: none; outline: none; }
  input:focus, textarea:focus { outline: none; }
  *::selection { background: var(--ochre); color: var(--cream); }
  a { color: inherit; text-decoration: none; }
  kbd {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--rule-soft);
    border: 1px solid var(--rule);
  }

  /* Paper texture overlay */
  .paper-noise {
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.18;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }
  @media (min-width: 768px) { .app { flex-direction: row; } }

  /* SIDEBAR */
  .sidebar {
    width: 100%;
    background: var(--sidebar);
    border-bottom: 1px solid var(--rule);
    padding: 1.5rem;
    transition: box-shadow 0.18s ease, background 0.18s ease;
  }
  @media (min-width: 768px) {
    .sidebar {
      width: 18rem;
      min-height: 100vh;
      border-bottom: none;
      border-right: 1px solid var(--rule);
      padding: 2rem 2rem 2.25rem;
    }
  }
  body.dragging-item .sidebar {
    box-shadow: inset -3px 0 0 rgba(61, 90, 71, 0.18);
  }
  .logo {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 2.5rem;
  }
  .logo-box {
    width: 2.25rem; height: 2.25rem; border-radius: 0.25rem;
    background: var(--primary);
    color: var(--cream);
    display: flex; align-items: center; justify-content: center;
  }
  .logo-name {
    font-family: var(--font-serif);
    font-size: 1.3rem; font-weight: 500; line-height: 1;
  }
  .logo-sub {
    font-size: 0.7rem; letter-spacing: 0.1em; opacity: 0.5;
    text-transform: uppercase;
  }

  .col-item {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.56rem 0.75rem;
    border-radius: 0.25rem;
    transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    margin-bottom: 1px;
    text-align: left;
  }
  .col-item:hover:not(.active) { background: rgba(28, 24, 20, 0.05); }
  .col-item.active { background: var(--primary); color: var(--cream); }
  .col-item.drop-target {
    background: rgba(61, 90, 71, 0.15);
    box-shadow: inset 0 0 0 1px var(--primary);
  }
  .col-item.active.drop-target {
    box-shadow: inset 0 0 0 2px var(--cream);
  }
  .col-item-left {
    display: flex; align-items: center; gap: 0.75rem;
    font-size: 0.9rem;
    min-width: 0;
  }
  .col-item-left span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .col-item-right { font-size: 0.75rem; opacity: 0.6; display: flex; align-items: center; gap: 0.5rem; }
  .col-delete { opacity: 0; transition: opacity 0.15s; }
  .col-item:hover .col-delete { opacity: 0.6; }
  .col-delete:hover { opacity: 1 !important; }

  .sidebar-label {
    font-size: 0.65rem; letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0.45; font-weight: 500;
    margin-top: 2rem; margin-bottom: 0.6rem;
  }
  .sidebar-label.inline { margin: 0; }
  .label-row { display: flex; align-items: center; justify-content: space-between; margin-top: 2rem; margin-bottom: 0.6rem; }
  .add-folder { opacity: 0.4; transition: opacity 0.15s; }
  .add-folder:hover { opacity: 1; }
  .folder-list {
    min-height: 2rem;
    border-radius: 0.25rem;
    transition: background 0.15s ease;
  }
  body.dragging-item .folder-list {
    background: rgba(61, 90, 71, 0.06);
    box-shadow: inset 0 0 0 1px rgba(61, 90, 71, 0.12);
  }
  .folder-empty {
    font-size: 0.75rem;
    opacity: 0.4;
    font-style: italic;
    padding: 0.35rem 0.75rem;
  }
  body.dragging-item .folder-empty { opacity: 0.62; }

  /* MAIN */
  .main { flex: 1; min-height: 100vh; }
  .header {
    padding: 2.5rem 1.5rem 1.5rem;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 1.5rem;
  }
  @media (min-width: 768px) { .header { padding: 3.5rem 3rem 1.5rem; } }
  .header-title {
    font-family: var(--font-serif);
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 400; line-height: 1; letter-spacing: -0.02em;
    margin: 0;
  }
  .header-count {
    font-size: 0.78rem; opacity: 0.45; margin-top: 0.6rem; font-style: italic;
  }
  .header-actions { display: flex; align-items: center; gap: 0.45rem; }
  .icon-btn {
    width: 2.5rem; height: 2.5rem; border-radius: 0.25rem;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s, transform 0.15s, box-shadow 0.15s;
  }
  .icon-btn:hover {
    background: rgba(28, 24, 20, 0.05);
    border-color: var(--rule);
  }
  .icon-btn.primary {
    background: var(--primary); color: var(--cream);
    box-shadow: 0 8px 18px -14px rgba(28, 24, 20, 0.6);
  }
  .icon-btn.primary:hover { opacity: 0.92; background: var(--primary); }

  .content { padding: 0 1.5rem 5rem; }
  @media (min-width: 768px) { .content { padding: 0 3rem 5rem; } }

  /* GRID */
  .grid {
    display: grid;
    gap: 1.35rem;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .card {
    background: var(--paper);
    border: 1px solid rgba(28, 24, 20, 0.10);
    border-radius: 0.25rem;
    padding: 1.35rem;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    min-height: 172px;
    display: flex; flex-direction: column;
    animation: fadeIn 0.3s ease;
    box-shadow: 0 1px 0 rgba(28, 24, 20, 0.03);
  }
  .card[draggable="true"] { cursor: grab; }
  .card.dragging {
    cursor: grabbing;
    opacity: 0.55;
    transform: rotate(-1deg);
  }
  .card:hover {
    transform: translateY(-1px);
    border-color: rgba(28, 24, 20, 0.16);
    box-shadow: 0 14px 32px -22px rgba(28, 24, 20, 0.36);
  }
  .card-top {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.68rem; margin-bottom: 0.85rem;
  }
  .card-type {
    display: flex; align-items: center; gap: 0.375rem;
    opacity: 0.55;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .card-coll { font-weight: 500; }
  .card-title {
    font-family: var(--font-serif);
    font-size: 1.18rem;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: 0;
    margin: 0 0 0.5rem 0;
  }
  .card-content {
    font-size: 0.85rem;
    line-height: 1.5;
    opacity: 0.68;
    margin: 0 0 0.75rem 0;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-image {
    width: 100%;
    max-height: 12rem;
    object-fit: contain;
    border-radius: 0.2rem;
    border: 1px solid var(--rule-soft);
    background: var(--cream);
    margin: 0.15rem 0 0.85rem;
  }
  .card-url {
    display: inline-flex; align-items: center; gap: 0.375rem;
    font-size: 0.75rem;
    color: var(--burgundy);
    margin-bottom: 0.75rem;
  }
  .card-url span { text-decoration: underline; text-underline-offset: 2px; }
  .link-preview {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.75rem;
    border: 1px solid var(--rule-soft);
    border-radius: 0.25rem;
    background: rgba(255, 255, 255, 0.28);
    margin: 0.15rem 0 0.85rem;
    min-width: 0;
  }
  .link-preview:hover { border-color: var(--rule); background: rgba(255, 255, 255, 0.38); }
  .link-favicon {
    width: 1.55rem; height: 1.55rem;
    border-radius: 0.2rem;
    flex-shrink: 0;
    background: var(--cream-2);
  }
  .link-preview-text { min-width: 0; }
  .link-preview-domain {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--burgundy);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .link-preview-url {
    display: block;
    margin-top: 0.12rem;
    font-size: 0.72rem;
    opacity: 0.52;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .view-link-preview {
    margin: 0;
    background: var(--cream);
  }
  .card-bottom {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-top: auto; padding-top: 0.75rem;
    border-top: 1px solid var(--rule-soft);
    gap: 0.5rem;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 0.375rem; }
  .tag {
    font-size: 0.68rem;
    padding: 3px 8px;
    border-radius: 2px;
    background: var(--cream-2);
    opacity: 0.85;
  }
  .tag-more { font-size: 0.68rem; opacity: 0.5; }
  .study-toggle { flex-shrink: 0; opacity: 0.4; transition: opacity 0.15s; }
  .study-toggle.studied { opacity: 1; color: var(--moss); }

  /* EMPTY STATE */
  .empty {
    padding: 4rem 0 6rem;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }
  .empty-mark {
    width: 4rem; height: 4rem;
    margin: 0 auto 1rem;
    border-radius: 9999px;
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 14px 30px -24px rgba(28, 24, 20, 0.45);
  }
  .empty-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 3rem; height: 3rem;
    border-radius: 9999px;
    background: var(--primary); color: var(--cream);
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 10px 20px -16px rgba(28, 24, 20, 0.7);
  }
  .empty-btn:hover { transform: translateY(-1px) scale(1.03); }
  .empty-text {
    margin: 0 0 1.1rem;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 1rem;
    opacity: 0.62;
  }

  /* OVERLAY */
  .overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(28, 24, 20, 0.4);
    backdrop-filter: blur(4px);
    display: flex;
    padding: 1rem;
    animation: bgFade 0.2s ease;
  }
  .overlay.center { align-items: center; justify-content: center; }
  .overlay.top { align-items: flex-start; justify-content: center; padding-top: 5rem; }

  .panel {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 0.25rem;
    width: 100%;
    overflow: hidden;
    animation: panelIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .panel.search-panel { max-width: 36rem; }
  .panel.modal-panel { max-width: 42rem; max-height: 90vh; display: flex; flex-direction: column; }

  /* SEARCH */
  .search-head {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--rule);
  }
  .search-input { flex: 1; font-size: 0.95rem; }
  .search-results { max-height: 20rem; overflow-y: auto; }
  .search-result {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 0.75rem; width: 100%;
    padding: 0.75rem 1.25rem;
    text-align: left;
    border-bottom: 1px solid var(--rule-soft);
    transition: background 0.1s;
  }
  .search-result:hover { background: rgba(28, 24, 20, 0.04); }
  .search-result-text { min-width: 0; }
  .search-result-title {
    font-family: var(--font-serif);
    font-size: 0.95rem; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin: 0;
  }
  .search-result-body {
    font-size: 0.78rem; opacity: 0.6;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin: 2px 0 0 0;
  }
  .search-result-coll { font-size: 0.7rem; flex-shrink: 0; margin-top: 3px; }
  .search-empty {
    text-align: center;
    padding: 2rem 1.25rem;
    opacity: 0.5;
    font-size: 0.85rem;
    font-style: italic;
  }

  /* MODAL */
  .modal-head {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head-label {
    font-size: 0.7rem; letter-spacing: 0.18em;
    text-transform: uppercase; opacity: 0.5;
  }
  .modal-body { overflow-y: auto; padding: 1.25rem 1.5rem; }
  .modal-body > * + * { margin-top: 1.25rem; }
  .view-meta {
    display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.58;
  }
  .view-meta span { display: inline-flex; align-items: center; gap: 0.35rem; }
  .view-title {
    font-family: var(--font-serif);
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 500;
    line-height: 1.08;
    margin: 0;
  }
  .view-content {
    font-size: 1rem;
    line-height: 1.72;
    white-space: pre-wrap;
  }
  .view-content.serif {
    font-family: var(--font-serif);
    font-size: 1.08rem;
  }
  .view-empty {
    font-family: var(--font-serif);
    font-style: italic;
    opacity: 0.5;
  }
  .view-link {
    display: inline-flex; align-items: center; gap: 0.45rem;
    color: var(--burgundy);
    font-size: 0.9rem;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .view-image {
    display: block;
    max-width: 100%;
    max-height: 68vh;
    object-fit: contain;
    border-radius: 0.25rem;
    border: 1px solid var(--rule);
    background: var(--cream);
    cursor: zoom-in;
  }
  .view-image.expanded {
    max-height: none;
    cursor: zoom-out;
  }
  .paste-preview {
    border: 1px solid var(--rule);
    border-radius: 0.25rem;
    background: var(--cream);
    padding: 1rem;
    max-height: 18rem;
    overflow: auto;
  }
  .paste-preview-text {
    margin: 0;
    white-space: pre-wrap;
    font-size: 0.92rem;
    line-height: 1.6;
  }
  .paste-preview-image {
    display: block;
    max-width: 100%;
    max-height: 16rem;
    object-fit: contain;
    margin: 0 auto;
    border-radius: 0.2rem;
  }
  .crop-tools {
    display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
    margin-bottom: 0.75rem;
  }
  .crop-help {
    font-size: 0.78rem;
    font-style: italic;
    opacity: 0.55;
  }
  .crop-stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    max-height: 22rem;
    overflow: hidden;
    user-select: none;
    touch-action: none;
  }
  .crop-stage img {
    display: block;
    max-width: 100%;
    max-height: 22rem;
    object-fit: contain;
    border-radius: 0.2rem;
  }
  .crop-selection {
    position: fixed;
    display: none;
    border: 2px solid var(--primary);
    background: rgba(61, 90, 71, 0.18);
    box-shadow: 0 0 0 9999px rgba(28, 24, 20, 0.28);
    pointer-events: none;
    z-index: 70;
  }
  .type-row, .coll-row, .tag-row { display: flex; flex-wrap: wrap; gap: 0.375rem; align-items: center; }
  .field-label {
    display: block;
    font-size: 0.7rem; letter-spacing: 0.14em;
    text-transform: uppercase; opacity: 0.55;
    margin-bottom: 0.5rem; font-weight: 500;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 0.375rem;
    padding: 0.375rem 0.75rem;
    border-radius: 0.25rem;
    border: 1px solid var(--rule);
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .chip.active { background: var(--primary); color: var(--cream); border-color: var(--primary); }
  .chip-coll.active { color: var(--cream); }
  .input-title {
    width: 100%; padding: 0.5rem 0;
    font-family: var(--font-serif);
    font-size: 1.3rem;
    border-bottom: 1px solid var(--rule);
  }
  .input-url {
    width: 100%; padding: 0.5rem 0;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    border-bottom: 1px solid var(--rule);
  }
  .textarea {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid var(--rule);
    border-radius: 0.25rem;
    font-size: 0.92rem;
    line-height: 1.6;
    resize: vertical;
    min-height: 8rem;
  }
  .textarea.serif { font-family: var(--font-serif); }
  .tag-chip {
    display: inline-flex; align-items: center; gap: 0.25rem;
    padding: 0.25rem 0.5rem;
    border-radius: 0.25rem;
    background: var(--cream-2);
    font-size: 0.78rem;
  }
  .tag-remove { opacity: 0.5; transition: opacity 0.15s; }
  .tag-remove:hover { opacity: 1; }
  .tag-input {
    padding: 0.25rem 0;
    font-size: 0.85rem;
    flex: 1; min-width: 8rem;
  }
  .modal-foot {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: space-between;
    gap: 0.75rem;
  }
  .modal-foot-actions { display: flex; align-items: center; gap: 0.25rem; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bgFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes panelIn { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
</style>
</head>
<body>

<!-- Paper texture -->
<svg class="paper-noise" aria-hidden="true">
  <filter id="paper-noise-filter">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix values="0 0 0 0 0.11  0 0 0 0 0.09  0 0 0 0 0.07  0 0 0 0.07 0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#paper-noise-filter)"/>
</svg>

<!-- SVG icon sprite -->
<svg style="position:absolute;width:0;height:0" aria-hidden="true">
  <defs>
    <symbol id="i-library" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16M8 5v15M12 4v16M16 6l3 13M20 18l-2 1"/></symbol>
    <symbol id="i-inbox" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11Z"/></symbol>
    <symbol id="i-book-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></symbol>
    <symbol id="i-book-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6v12a2 2 0 0 0 2 2h11"/><path d="M21 6v6"/><path d="M3 6a2 2 0 0 1 2-2h16v4H5a2 2 0 0 1-2-2Z"/><path d="m15 17 2 2 4-4"/></symbol>
    <symbol id="i-feather" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12.67 19a2 2 0 0 0 1.416-.588l6.154-6.172a6 6 0 0 0-8.49-8.49L5.586 9.914A2 2 0 0 0 5 11.328V18a1 1 0 0 0 1 1z"/><path d="M16 8 2 22"/><path d="M17.5 15H9"/></symbol>
    <symbol id="i-bookmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></symbol>
    <symbol id="i-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" x2="16" y1="12" y2="12"/></symbol>
    <symbol id="i-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></symbol>
    <symbol id="i-file-text" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></symbol>
    <symbol id="i-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></symbol>
    <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></symbol>
    <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></symbol>
    <symbol id="i-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></symbol>
    <symbol id="i-check-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></symbol>
    <symbol id="i-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></symbol>
  </defs>
</svg>

<div id="app"></div>
<div id="modal-root"></div>
<div id="search-root"></div>

<script>
// ============ CONSTANTS ============
const DEFAULT_COLLECTIONS = [
  { id: 'estudar',  name: 'Para Estudar',  icon: 'book-open',    color: '#b8843d', system: true },
  { id: 'estudado', name: 'Já Estudei',    icon: 'book-check',   color: '#5a7a4f', system: true },
  { id: 'escritos', name: 'Meus Escritos', icon: 'feather',      color: '#6b1f2a', system: true },
  { id: 'posts',    name: 'Posts Salvos',  icon: 'bookmark',     color: '#7a5230', system: true },
  { id: 'links',    name: 'Links',         icon: 'link',         color: '#3d5a6c', system: true },
  { id: 'prints',   name: 'Prints',        icon: 'image',        color: '#6a5687', system: true },
];

const ITEM_TYPES = [
  { id: 'note',  label: 'Nota / Escrito', icon: 'file-text' },
  { id: 'link',  label: 'Link',           icon: 'link' },
  { id: 'post',  label: 'Post Salvo',     icon: 'bookmark' },
  { id: 'file',  label: 'Arquivo',        icon: 'folder' },
  { id: 'image', label: 'Imagem / Print', icon: 'image' },
];

const STORAGE_KEY = 'biblioteca:v1';

// ============ HELPERS ============
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const isEditableTarget = (el) => el?.closest?.('input, textarea, select, [contenteditable="true"]');

function icon(name, size=16) {
  return `<svg width="${size}" height="${size}"><use href="#i-${name}"/></svg>`;
}

function getDomain(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return null; }
}

function normalizeUrl(text) {
  const value = String(text || '').trim();
  if (/^https?:\/\/\S+$/i.test(value)) return value;
  if (/^[\w.-]+\.[a-z]{2,}(\/\S*)?$/i.test(value)) return 'https://' + value;
  return null;
}

function syncDefaultCollections(collections) {
  const existing = Array.isArray(collections) ? collections : [];
  const byId = new Map(existing.map(c => [c.id, c]));
  const systemIds = new Set(DEFAULT_COLLECTIONS.map(c => c.id));
  const systemCols = DEFAULT_COLLECTIONS.map(def => ({ ...def, ...(byId.get(def.id) || {}), system: true }));
  const userCols = existing.filter(c => !systemIds.has(c.id));
  return [...systemCols, ...userCols];
}

// ============ STATE ============
let state = {
  items: [],
  collections: [...DEFAULT_COLLECTIONS],
  activeCol: 'all',
  search: '',
  editing: null,
  viewing: null,
  quickAdd: null,
  showSearch: false,
  loading: true,
};

let saveTimer;
let draggingItemId = null;
let currentDropTarget = null;
let pointerDrag = null;
let cropDrag = null;
let suppressNextClick = false;

function persist() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        items: state.items,
        collections: state.collections,
      }));
    } catch (e) { console.error('Save failed:', e); }
  }, 250);
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (Array.isArray(data.items)) state.items = data.items;
      if (Array.isArray(data.collections) && data.collections.length) state.collections = data.collections;
    }
  } catch (e) { console.error('Load failed:', e); }
  state.collections = syncDefaultCollections(state.collections);
  state.loading = false;
}

// ============ MUTATIONS ============
function saveItem(item) {
  const exists = state.items.find(i => i.id === item.id);
  const now = Date.now();
  if (exists) {
    state.items = state.items.map(i => i.id === item.id ? { ...item, updatedAt: now } : i);
  } else {
    state.items = [{ ...item, id: uid(), createdAt: now, updatedAt: now }, ...state.items];
  }
  state.editing = null;
  state.viewing = null;
  state.quickAdd = null;
  persist();
  renderAll();
}

function deleteItem(id) {
  if (!confirm('Apagar este item?')) return;
  state.items = state.items.filter(i => i.id !== id);
  state.editing = null;
  state.viewing = null;
  state.quickAdd = null;
  persist();
  renderAll();
}

function toggleStudied(id) {
  state.items = state.items.map(i => {
    if (i.id !== id) return i;
    const newCol = i.collection === 'estudado' ? 'estudar' : 'estudado';
    return { ...i, collection: newCol, updatedAt: Date.now() };
  });
  persist();
  renderApp();
}

function moveItemToCollection(itemId, collectionId) {
  if (!state.collections.some(c => c.id === collectionId)) return;
  const item = state.items.find(i => i.id === itemId);
  if (!item || item.collection === collectionId) return;

  state.items = state.items.map(i =>
    i.id === itemId ? { ...i, collection: collectionId, updatedAt: Date.now() } : i
  );
  persist();
  renderApp();
}

function setDropTarget(el) {
  if (currentDropTarget === el) return;
  if (currentDropTarget) currentDropTarget.classList.remove('drop-target');
  currentDropTarget = el;
  if (currentDropTarget) currentDropTarget.classList.add('drop-target');
}

function clearDropTarget() {
  setDropTarget(null);
}

function setDraggingMode(active) {
  document.body.classList.toggle('dragging-item', active);
}

function resetPointerDrag() {
  if (pointerDrag?.card) pointerDrag.card.classList.remove('dragging');
  pointerDrag = null;
  draggingItemId = null;
  clearDropTarget();
  setDraggingMode(false);
}

function addCollection() {
  const name = prompt('Nome da nova coleção:');
  if (!name || !name.trim()) return;
  const id = 'c_' + uid();
  state.collections.push({ id, name: name.trim(), icon: 'folder', color: '#87807a', system: false });
  state.activeCol = id;
  persist();
  renderApp();
}

function deleteCollection(id) {
  const col = state.collections.find(c => c.id === id);
  if (!col || col.system) return;
  if (!confirm(`Apagar "${col.name}"? Os itens dentro vão para "Links".`)) return;
  state.collections = state.collections.filter(c => c.id !== id);
  state.items = state.items.map(i => i.collection === id ? { ...i, collection: 'links' } : i);
  if (state.activeCol === id) state.activeCol = 'all';
  persist();
  renderApp();
}

function setActiveCol(id) {
  state.activeCol = id;
  renderApp();
}

function openEditor(item) {
  state.editing = item || { isNew: true, collection: state.activeCol !== 'all' ? state.activeCol : undefined };
  state.viewing = null;
  state.quickAdd = null;
  renderModal();
}

function closeEditor() {
  state.editing = null;
  renderModal();
}

function openViewer(item) {
  if (!item) return;
  state.viewing = item;
  state.editing = null;
  state.quickAdd = null;
  renderModal();
}

function closeViewer() {
  state.viewing = null;
  renderModal();
}

function openQuickAdd(draft) {
  state.quickAdd = {
    ...draft,
    title: draft.title || '',
    collection: draft.collection || (state.activeCol !== 'all' ? state.activeCol : 'links'),
  };
  state.editing = null;
  state.viewing = null;
  renderModal();
}

function closeQuickAdd() {
  state.quickAdd = null;
  renderModal();
}

function saveQuickAdd() {
  if (!state.quickAdd) return;
  const title = $('#quick-title')?.value.trim();
  const item = {
    ...state.quickAdd,
    title: title || state.quickAdd.title || defaultQuickTitle(state.quickAdd),
  };
  delete item.previewLabel;
  delete item.kind;
  delete item.originalImageData;
  delete item.cropRect;
  saveItem(item);
}

function openSearch() {
  state.showSearch = true;
  state.search = '';
  renderSearchOverlay();
  setTimeout(() => $('#search-input')?.focus(), 30);
}

function closeSearch() {
  state.showSearch = false;
  state.search = '';
  renderSearchOverlay();
}

// ============ DERIVED ============
function filteredItems() {
  const q = state.search.trim().toLowerCase();
  return state.items.filter(it => {
    if (state.activeCol !== 'all' && it.collection !== state.activeCol) return false;
    if (!q) return true;
    return (
      (it.title || '').toLowerCase().includes(q) ||
      (it.content || '').toLowerCase().includes(q) ||
      (it.url || '').toLowerCase().includes(q) ||
      (it.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
}

function counts() {
  const m = { all: state.items.length };
  state.items.forEach(i => { m[i.collection] = (m[i.collection] || 0) + 1; });
  return m;
}

function globalSearchResults() {
  const q = state.search.trim().toLowerCase();
  if (!q) return [];
  return state.items.filter(it =>
    (it.title || '').toLowerCase().includes(q) ||
    (it.content || '').toLowerCase().includes(q) ||
    (it.url || '').toLowerCase().includes(q) ||
    (it.tags || []).some(t => t.toLowerCase().includes(q))
  ).slice(0, 8);
}

function defaultQuickTitle(draft) {
  if (draft.type === 'image') return 'Print salvo';
  if (draft.type === 'link') return getDomain(draft.url) || 'Link salvo';
  return 'Nota salva';
}

function pastePreviewText(text) {
  const value = String(text || '');
  return value.length > 700 ? value.slice(0, 700).trimEnd() + '...' : value;
}

function shortUrl(url) {
  try {
    const u = new URL(url);
    const path = (u.pathname || '').replace(/\/$/, '');
    return (u.hostname.replace(/^www\./, '') + path).slice(0, 72);
  } catch {
    return String(url || '').slice(0, 72);
  }
}

function faviconUrl(url) {
  const domain = getDomain(url);
  return domain ? `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=64` : '';
}

function renderLinkPreview(url, extraClass='') {
  const domain = getDomain(url);
  if (!domain) return '';
  return `
    <a class="link-preview ${extraClass}" href="${esc(url)}" target="_blank" rel="noopener" data-stop>
      <img class="link-favicon" src="${esc(faviconUrl(url))}" alt="">
      <span class="link-preview-text">
        <span class="link-preview-domain">${esc(domain)}</span>
        <span class="link-preview-url">${esc(shortUrl(url))}</span>
      </span>
    </a>
  `;
}

// ============ RENDER: MAIN APP ============
function renderApp() {
  const c = counts();
  const cur = state.collections.find(c => c.id === state.activeCol);
  const activeColName = state.activeCol === 'all' ? 'Tudo' : (cur?.name || 'Coleção');
  const items = filteredItems();

  const sysCols = state.collections.filter(c => c.system);
  const userCols = state.collections.filter(c => !c.system);

  $('#app').innerHTML = `
    <div class="app">
      <aside class="sidebar">
        <div class="logo">
          <div class="logo-box">${icon('library', 18)}</div>
          <div>
            <div class="logo-name">Biblioteca</div>
            <div class="logo-sub">Pessoal</div>
          </div>
        </div>

        <button class="col-item ${state.activeCol === 'all' ? 'active' : ''}" data-action="set-col" data-id="all">
          <span class="col-item-left">${icon('inbox', 15)}<span>Tudo</span></span>
          <span class="col-item-right">${c.all || 0}</span>
        </button>

        <div class="sidebar-label">Coleções</div>
        <div>
          ${sysCols.map(col => renderColItem(col, state.activeCol === col.id, c[col.id] || 0, false)).join('')}
        </div>

        <div class="label-row">
          <div class="sidebar-label inline">Minhas Pastas</div>
          <button class="add-folder" data-action="add-col" title="Nova coleção">${icon('plus', 14)}</button>
        </div>
        <div class="folder-list">
          ${userCols.length === 0
            ? '<p class="folder-empty">Crie pastas próprias para arrastar itens</p>'
            : userCols.map(col => renderColItem(col, state.activeCol === col.id, c[col.id] || 0, true)).join('')}
        </div>
      </aside>

      <main class="main">
        <header class="header">
          <div>
            <h2 class="header-title">${esc(activeColName)}</h2>
            <p class="header-count">${items.length === 0 ? '' : items.length === 1 ? '1 item' : items.length + ' itens'}</p>
          </div>
          <div class="header-actions">
            <button class="icon-btn" data-action="open-search" title="Buscar  ⌘K">${icon('search', 17)}</button>
            <button class="icon-btn primary" data-action="new-item" title="Adicionar  ⌘N">${icon('plus', 18)}</button>
          </div>
        </header>

        <section class="content">
          ${state.loading
            ? '<div style="padding:5rem 0;text-align:center;opacity:0.4;font-style:italic;">carregando...</div>'
            : items.length === 0
              ? renderEmpty(state.items.length === 0)
              : `<div class="grid">${items.map((it, i) => renderCard(it, i)).join('')}</div>`
          }
        </section>
      </main>
    </div>
  `;
}

function renderColItem(col, active, count, deletable) {
  return `
    <button class="col-item ${active ? 'active' : ''}" data-action="set-col" data-id="${esc(col.id)}" data-drop-col="${esc(col.id)}">
      <span class="col-item-left">
        <span style="color:${col.color};display:inline-flex;flex-shrink:0;">${icon(col.icon, 15)}</span>
        <span>${esc(col.name)}</span>
      </span>
      <span class="col-item-right">
        ${deletable ? `<span class="col-delete" data-action="del-col" data-id="${esc(col.id)}" title="Apagar pasta">${icon('x', 12)}</span>` : ''}
        <span>${count}</span>
      </span>
    </button>
  `;
}

function renderEmpty(isNew) {
  return `
    <div class="empty">
      <div class="empty-mark">${icon('library', 25)}</div>
      <p class="empty-text">${isNew ? 'comece pelo primeiro' : 'vazio por aqui'}</p>
      <button class="empty-btn" data-action="new-item" title="Adicionar item  ⌘N">${icon('plus', 21)}</button>
    </div>
  `;
}

function renderCard(item, idx) {
  const type = ITEM_TYPES.find(t => t.id === item.type) || ITEM_TYPES[0];
  const col = state.collections.find(c => c.id === item.collection);
  const isStudyable = item.collection === 'estudar' || item.collection === 'estudado';
  const isStudied = item.collection === 'estudado';
  const domain = item.url ? getDomain(item.url) : null;
  const tags = item.tags || [];

  return `
    <article class="card" data-action="view" data-id="${esc(item.id)}" draggable="true" style="animation-delay:${Math.min(idx * 30, 300)}ms">
      <div class="card-top">
        <span class="card-type">${icon(type.icon, 11)}<span>${esc(type.label)}</span></span>
        ${col ? `<span class="card-coll" style="color:${col.color}">${esc(col.name)}</span>` : ''}
      </div>
      <h3 class="card-title">${item.title ? esc(item.title) : '<em style="opacity:0.5">Sem título</em>'}</h3>
      ${item.imageData ? `<img class="card-image" src="${esc(item.imageData)}" alt="">` : ''}
      ${item.content ? `<p class="card-content">${esc(item.content)}</p>` : ''}
      ${domain ? renderLinkPreview(item.url) : ''}
      <div class="card-bottom">
        <div class="tags">
          ${tags.slice(0, 3).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
          ${tags.length > 3 ? `<span class="tag-more">+${tags.length - 3}</span>` : ''}
        </div>
        ${isStudyable
          ? `<button class="study-toggle ${isStudied ? 'studied' : ''}" data-action="toggle-studied" data-id="${esc(item.id)}" title="${isStudied ? 'Marcar como para estudar' : 'Marcar como estudado'}">${icon(isStudied ? 'check-circle' : 'circle', 18)}</button>`
          : ''}
      </div>
    </article>
  `;
}

// ============ RENDER: MODAL ============
function renderModal() {
  const root = $('#modal-root');
  if (state.quickAdd) { renderQuickAdd(root); return; }
  if (state.viewing) { renderViewer(root); return; }
  if (!state.editing) { root.innerHTML = ''; modalWasOpen = false; return; }

  // Capturar foco e cursor antes do re-render
  const active = document.activeElement;
  const focusedId = (active && active.id && root.contains(active)) ? active.id : null;
  const focusedSel = (active && typeof active.selectionStart === 'number') ? active.selectionStart : null;

  const it = state.editing;
  const isNew = !!it.isNew;
  const d = {
    id: it.id || null,
    type: it.type || 'note',
    title: it.title || '',
    content: it.content || '',
    url: it.url || '',
    imageData: it.imageData || '',
    collection: it.collection || (isNew ? 'links' : state.collections[0].id),
    tags: Array.isArray(it.tags) ? [...it.tags] : [],
  };

  root.innerHTML = `
    <div class="overlay center" data-close-overlay>
      <div class="panel modal-panel" data-stop-prop>
        <div class="modal-head">
          <span class="modal-head-label">${isNew ? 'Novo Item' : 'Editar'}</span>
          <button class="icon-btn" style="width:2rem;height:2rem;opacity:0.5;" data-action="close-editor" title="Fechar  ESC">${icon('x', 17)}</button>
        </div>

        <div class="modal-body">

let modalWasOpen = false;

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function compressImageDataUrl(dataUrl, maxSize = 1400, quality = 0.86) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      const width = Math.max(1, Math.round(img.width * scale));
      const height = Math.max(1, Math.round(img.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

function clamp(n, min, max) {
  return Math.max(min, Math.min(max, n));
}

function cropRectFromPoints(a, b) {
  const x1 = clamp(Math.min(a.x, b.x), 0, 1);
  const y1 = clamp(Math.min(a.y, b.y), 0, 1);
  const x2 = clamp(Math.max(a.x, b.x), 0, 1);
  const y2 = clamp(Math.max(a.y, b.y), 0, 1);
  return { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
}

function updateCropSelection(rect) {
  const sel = $('[data-crop-selection]');
  if (!sel || !cropDrag?.imgRect || !rect || rect.w < 0.01 || rect.h < 0.01) {
    if (sel) sel.style.display = 'none';
    return;
  }

  const box = cropDrag.imgRect;
  sel.style.display = 'block';
  sel.style.left = (box.left + rect.x * box.width) + 'px';
  sel.style.top = (box.top + rect.y * box.height) + 'px';
  sel.style.width = (rect.w * box.width) + 'px';
  sel.style.height = (rect.h * box.height) + 'px';
}

function pointInImage(e, rect) {
  return {
    x: clamp((e.clientX - rect.left) / rect.width, 0, 1),
    y: clamp((e.clientY - rect.top) / rect.height, 0, 1),
  };
}

function setQuickTitleFromDom() {
  if (state.quickAdd) state.quickAdd.title = $('#quick-title')?.value ?? state.quickAdd.title;
}

async function applyImageCrop() {
  if (!state.quickAdd?.imageData || !state.quickAdd.cropRect) return;
  setQuickTitleFromDom();

  const rect = state.quickAdd.cropRect;
  if (rect.w < 0.02 || rect.h < 0.02) return;

  const img = new Image();
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
    img.src = state.quickAdd.imageData;
  }).catch(() => null);
  if (!img.naturalWidth || !img.naturalHeight) return;

  const sx = Math.round(rect.x * img.naturalWidth);
  const sy = Math.round(rect.y * img.naturalHeight);
  const sw = Math.max(1, Math.round(rect.w * img.naturalWidth));
  const sh = Math.max(1, Math.round(rect.h * img.naturalHeight));
  const canvas = document.createElement('canvas');
  canvas.width = sw;
  canvas.height = sh;
  canvas.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

  state.quickAdd.imageData = canvas.toDataURL('image/jpeg', 0.9);
  state.quickAdd.cropRect = null;
  renderModal();
}

function clearImageCrop() {
  if (!state.quickAdd?.originalImageData) return;
  setQuickTitleFromDom();
  state.quickAdd.imageData = state.quickAdd.originalImageData;
  state.quickAdd.cropRect = null;
  renderModal();
}

async function draftFromClipboardData(clipboardData) {
  const items = Array.from(clipboardData?.items || []);
  const imageItem = items.find(it => it.type?.startsWith('image/'));
  if (imageItem) {
    const file = imageItem.getAsFile();
    if (file) {
      const raw = await fileToDataUrl(file);
      const imageData = await compressImageDataUrl(raw);
      return {
        type: 'image',
        title: '',
        content: '',
        url: '',
        imageData,
        originalImageData: imageData,
        cropRect: null,
        collection: state.activeCol !== 'all' ? state.activeCol : 'prints',
        tags: ['print'],
        previewLabel: 'Imagem copiada',
      };
    }
  }

  const text = clipboardData?.getData('text/plain')?.trim();
  if (!text) return null;

  const url = normalizeUrl(text);
  if (url) {
    return {
      type: 'link',
      title: getDomain(url) || '',
      content: '',
      url,
      collection: state.activeCol !== 'all' ? state.activeCol : 'links',
      tags: [],
      previewLabel: 'Link copiado',
    };
  }

  return {
    type: 'note',
    title: '',
    content: text,
    url: '',
    collection: state.activeCol !== 'all' ? state.activeCol : 'escritos',
    tags: [],
    previewLabel: 'Texto copiado',
  };
}

// ============ EVENT HANDLERS ============
document.addEventListener('dragstart', (e) => {
  const card = e.target.closest('.card[draggable="true"]');
  if (!card) return;

  draggingItemId = card.dataset.id;
  card.classList.add('dragging');
  setDraggingMode(true);
  if (e.dataTransfer) {
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', draggingItemId);
  }
});

document.addEventListener('dragend', (e) => {
  e.target.closest('.card')?.classList.remove('dragging');
  draggingItemId = null;
  clearDropTarget();
  setDraggingMode(false);
});

document.addEventListener('dragover', (e) => {
  const dropTarget = e.target.closest('[data-drop-col]');
  if (!dropTarget || !draggingItemId) return;

  e.preventDefault();
  if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
  setDropTarget(dropTarget);
});

document.addEventListener('dragleave', (e) => {
  const dropTarget = e.target.closest('[data-drop-col]');
  if (dropTarget && !dropTarget.contains(e.relatedTarget)) clearDropTarget();
});

document.addEventListener('drop', (e) => {
  const dropTarget = e.target.closest('[data-drop-col]');
  if (!dropTarget) return;

  e.preventDefault();
  const itemId = draggingItemId || e.dataTransfer?.getData('text/plain');
  const collectionId = dropTarget.dataset.dropCol;
  draggingItemId = null;
  clearDropTarget();
  moveItemToCollection(itemId, collectionId);
});

document.addEventListener('pointerdown', (e) => {
  const stage = e.target.closest('[data-crop-stage]');
  if (!stage || !state.quickAdd?.imageData) return;
  const img = stage.querySelector('img');
  if (!img) return;

  setQuickTitleFromDom();
  const rect = img.getBoundingClientRect();
  cropDrag = {
    imgRect: rect,
    start: pointInImage(e, rect),
  };
  state.quickAdd.cropRect = { x: cropDrag.start.x, y: cropDrag.start.y, w: 0, h: 0 };
  updateCropSelection(state.quickAdd.cropRect);
  e.preventDefault();
  e.stopPropagation();
});

document.addEventListener('pointermove', (e) => {
  if (!cropDrag || !state.quickAdd) return;
  const current = pointInImage(e, cropDrag.imgRect);
  state.quickAdd.cropRect = cropRectFromPoints(cropDrag.start, current);
  updateCropSelection(state.quickAdd.cropRect);
  e.preventDefault();
});

document.addEventListener('pointerup', (e) => {
  if (!cropDrag) return;
  updateCropSelection(state.quickAdd?.cropRect);
  cropDrag = null;
  e.preventDefault();
});

document.addEventListener('pointercancel', () => {
  cropDrag = null;
  updateCropSelection(null);
});

document.addEventListener('pointerdown', (e) => {
  if (e.button !== 0 || state.editing || state.viewing || state.quickAdd || state.showSearch) return;
  if (e.target.closest('[data-stop], button, input, textarea, select')) return;

  const card = e.target.closest('.card');
  if (!card) return;

  pointerDrag = {
    itemId: card.dataset.id,
    startX: e.clientX,
    startY: e.clientY,
    active: false,
    card,
  };
});

document.addEventListener('pointermove', (e) => {
  if (!pointerDrag) return;

  const dx = Math.abs(e.clientX - pointerDrag.startX);
  const dy = Math.abs(e.clientY - pointerDrag.startY);
  if (!pointerDrag.active && dx + dy < 8) return;

  pointerDrag.active = true;
  draggingItemId = pointerDrag.itemId;
  suppressNextClick = true;
  pointerDrag.card.classList.add('dragging');
  setDraggingMode(true);
  e.preventDefault();

  const dropTarget = document.elementFromPoint(e.clientX, e.clientY)?.closest('[data-drop-col]');
  setDropTarget(dropTarget || null);
});

document.addEventListener('pointerup', (e) => {
  if (!pointerDrag) return;

  const wasDragging = pointerDrag.active;
  const itemId = pointerDrag.itemId;
  const collectionId = currentDropTarget?.dataset.dropCol;

  if (wasDragging) {
    e.preventDefault();
    resetPointerDrag();
    if (collectionId) moveItemToCollection(itemId, collectionId);
    setTimeout(() => { suppressNextClick = false; }, 0);
    return;
  }

  pointerDrag = null;
});

document.addEventListener('pointercancel', resetPointerDrag);

document.addEventListener('click', (e) => {
  if (suppressNextClick) {
    e.preventDefault();
    e.stopPropagation();
    suppressNextClick = false;
    return;
  }

  // 1. Stop on elements explicitly marked (card URL link)
  if (e.target.closest('[data-stop]')) return;

  // 2. Modal-internal interactions (handled before generic action lookup)
  if (e.target.closest('.modal-panel')) {
    const typeChip = e.target.closest('#type-row [data-type]');
    if (typeChip) { e.stopPropagation(); changeDraftField('type', typeChip.dataset.type); return; }

    const collChip = e.target.closest('#coll-row [data-coll]');
    if (collChip) { e.stopPropagation(); changeDraftField('collection', collChip.dataset.coll); return; }

    const removeTagBtn = e.target.closest('[data-remove-tag]');
    if (removeTagBtn) {
      e.stopPropagation();
      const t = removeTagBtn.dataset.removeTag;
      syncDraftFromDom();
      modalDraft.tags = modalDraft.tags.filter(x => x !== t);
      state.editing = { ...modalDraft, isNew: !modalDraft.id };
      renderModal();
      return;
    }

    const quickCollChip = e.target.closest('#quick-coll-row [data-quick-coll]');
    if (quickCollChip && state.quickAdd) {
      e.stopPropagation();
      state.quickAdd.title = $('#quick-title')?.value ?? state.quickAdd.title;
      state.quickAdd.collection = quickCollChip.dataset.quickColl;
      renderModal();
      return;
    }
  }

  // 3. Overlay click (outside panel) — close
  const overlay = e.target.closest('[data-close-overlay]');
  if (overlay && !e.target.closest('[data-stop-prop]')) {
    if (state.editing) closeEditor();
    if (state.viewing) closeViewer();
    if (state.quickAdd) closeQuickAdd();
    if (state.showSearch) closeSearch();
    return;
  }

  // 4. Generic data-action dispatcher
  const actionEl = e.target.closest('[data-action]');
  if (!actionEl) return;
  const action = actionEl.dataset.action;
  const id = actionEl.dataset.id;
  e.stopPropagation();

  switch (action) {
    case 'set-col': setActiveCol(id); break;
    case 'add-col': addCollection(); break;
    case 'del-col': deleteCollection(id); break;
    case 'new-item': openEditor(null); break;
    case 'view': openViewer(state.items.find(i => i.id === id)); break;
    case 'edit': openEditor(state.items.find(i => i.id === id)); break;
    case 'toggle-studied': toggleStudied(id); break;
    case 'open-search': openSearch(); break;
    case 'close-editor': closeEditor(); break;
    case 'close-viewer': closeViewer(); break;
    case 'close-quick-add': closeQuickAdd(); break;
    case 'apply-crop': applyImageCrop(); break;
    case 'clear-crop': clearImageCrop(); break;
    case 'toggle-image-zoom': actionEl.classList.toggle('expanded'); break;
    case 'save-item': handleSave(); break;
    case 'save-quick-add': saveQuickAdd(); break;
    case 'delete-item': deleteItem(id); break;
    case 'open-result':
      const item = state.items.find(i => i.id === id);
      closeSearch();
      if (item) openViewer(item);
      break;
  }
});

document.addEventListener('paste', async (e) => {
  if (state.editing || state.viewing || state.quickAdd || state.showSearch) return;
  if (isEditableTarget(e.target)) return;

  const clipboardItems = Array.from(e.clipboardData?.items || []);
  const hasImage = clipboardItems.some(it => it.type?.startsWith('image/'));
  const hasText = !!e.clipboardData?.getData('text/plain')?.trim();
  if (!hasImage && !hasText) return;

  e.preventDefault();
  const draft = await draftFromClipboardData(e.clipboardData);
  if (!draft) return;
  openQuickAdd(draft);
});

function syncDraftFromDom() {
  if (!modalDraft) return;
  modalDraft.title = $('#f-title')?.value ?? modalDraft.title;
  modalDraft.url = $('#f-url')?.value ?? modalDraft.url;
  modalDraft.content = $('#f-content')?.value ?? modalDraft.content;
}

function changeDraftField(key, value) {
  if (!modalDraft) return;
  syncDraftFromDom();
  modalDraft[key] = value;
  state.editing = { ...modalDraft, isNew: !modalDraft.id };
  renderModal();
}

// Tag input
document.addEventListener('keydown', (e) => {
  const tagInput = $('#f-tag');
  if (e.target === tagInput) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const v = tagInput.value.trim();
      if (v && !modalDraft.tags.includes(v)) {
        modalDraft.tags.push(v);
        modalDraft.title = $('#f-title')?.value || '';
        modalDraft.url = $('#f-url')?.value || '';
        modalDraft.content = $('#f-content')?.value || '';
        state.editing = { ...modalDraft, isNew: !modalDraft.id };
        renderModal();
      } else {
        tagInput.value = '';
      }
      return;
    }
    if (e.key === 'Backspace' && !tagInput.value && modalDraft.tags.length) {
      modalDraft.tags.pop();
      modalDraft.title = $('#f-title')?.value || '';
      modalDraft.url = $('#f-url')?.value || '';
      modalDraft.content = $('#f-content')?.value || '';
      state.editing = { ...modalDraft, isNew: !modalDraft.id };
      renderModal();
      return;
    }
  }
});

// Search input
document.addEventListener('input', (e) => {
  if (e.target.id === 'search-input') {
    state.search = e.target.value;
    updateSearchResults();
  }
});

// Global keyboard shortcuts
document.addEventListener('keydown', (e) => {
  const mod = e.metaKey || e.ctrlKey;
  if (mod && e.key.toLowerCase() === 'k') { e.preventDefault(); openSearch(); return; }
  if (mod && e.key.toLowerCase() === 'n') { e.preventDefault(); openEditor(null); return; }
  if (e.key === 'Escape') {
    if (state.editing) closeEditor();
    else if (state.viewing) closeViewer();
    else if (state.quickAdd) closeQuickAdd();
    else if (state.showSearch) closeSearch();
  }
});

// ============ INIT ============
load();
renderAll();
</script>
</body>
</html>
